name: Build and Test Wheels

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: wheels-windows
          - os: macos-latest
            artifact_name: wheels-macos
          - os: ubuntu-latest
            artifact_name: wheels-linux

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up vcpkg using run-vcpkg action
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "C:/vcpkg"
          vcpkgJsonGlob: "vcpkg.json"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_BUILD: "cp312-*"
          CIBW_SKIP: "*-musllinux_* *-win32"

          # --- Windows: use vcpkg ---
          CIBW_ENVIRONMENT_WINDOWS: >
            VCPKG_ROOT=C:/vcpkg
            VCPKG_DEFAULT_TRIPLET=x64-windows-release

          # --- macOS: install deps via Homebrew ---
          CIBW_BEFORE_ALL_MACOS: >
            brew install sdl3 sdl3_ttf box2d
          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=15.0
            CMAKE_PREFIX_PATH=/opt/homebrew

          # --- Linux: install system headers, build SDL deps from source ---
          CIBW_BEFORE_ALL_LINUX: >
            dnf -y install
            alsa-lib-devel pipewire-devel pulseaudio-libs-devel
            libXrandr-devel libXcursor-devel libXi-devel libXinerama-devel libXfixes-devel libXScrnSaver-devel libXtst-devel
            mesa-libEGL-devel mesa-libgbm-devel
            wayland-devel wayland-protocols-devel libxkbcommon-devel
            libpng-devel libjpeg-turbo-devel freetype-devel flac-devel
            libzstd-devel &&
            bash {project}/scripts/build-linux-deps.sh
          CIBW_ENVIRONMENT_LINUX: >
            CMAKE_PREFIX_PATH=/opt/deps

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          path: ./wheelhouse/*.whl
          archive: false

  test:
    needs: build_wheels
    name: Test ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.12, 3.13, 3.14]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: |
            ${{ runner.os == 'Windows' && '*win_amd64.whl' || '' }}
            ${{ runner.os == 'macOS' && '*macosx*.whl' || '' }}
            ${{ runner.os == 'Linux' && '*manylinux*.whl' || '' }}

      - name: Install from Wheel
        shell: bash
        run: |
          chmod +x scripts/install_wheels.sh
          ./scripts/install_wheels.sh

      - name: Run tests
        run: |
          mv src _src_backup
          python -m pytest tests -q
          mv _src_backup src
