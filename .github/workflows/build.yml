name: Build and Test Wheels

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup ccache / sccache (Host)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          # MSVC requires sccache. macOS uses standard ccache.
          variant: ${{ runner.os == 'Windows' && 'sccache' || 'ccache' }}
          key: ${{ runner.os }}-cibw-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cibw-cache-
          max-size: 2G

      - name: Setup ccache (Linux Container)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: .ccache
          key: Linux-cibw-cache-${{ github.sha }}
          restore-keys: |
            Linux-cibw-cache-

      - name: Setup vcpkg Cache (Linux Container)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: .vcpkg_cache
          key: Linux-vcpkg-cache-${{ github.sha }}
          restore-keys: |
            Linux-vcpkg-cache-

      - name: Set up vcpkg
        if: runner.os == 'Windows' || runner.os == 'macOS'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ runner.os == 'Windows' && 'C:/vcpkg' || '/Users/runner/work/vcpkg' }}
          vcpkgJsonGlob: "vcpkg.json"

      - name: Setup MSVC Developer Command Prompt (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_BUILD: "cp312-*"
          CIBW_SKIP: "*-musllinux_* *-win32"

          # --- Windows ---
          CIBW_BEFORE_ALL_WINDOWS: >
            pip install ninja
          CIBW_ENVIRONMENT_WINDOWS: >
            CC=cl
            CXX=cl
            VCPKG_ROOT=C:/vcpkg
            VCPKG_DEFAULT_TRIPLET=x64-windows-release
            CMAKE_GENERATOR=Ninja
            CMAKE_C_COMPILER_LAUNCHER=sccache
            CMAKE_CXX_COMPILER_LAUNCHER=sccache

          # --- macOS ---
          CIBW_BEFORE_ALL_MACOS: brew install ninja
          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=15.0
            CMAKE_GENERATOR=Ninja
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            VCPKG_ROOT=/Users/runner/work/vcpkg
            VCPKG_DEFAULT_TRIPLET=arm64-osx-release

          # --- Linux ---
          CIBW_MANYLINUX_X86_64_IMAGE: "ghcr.io/kraken-engine/kraken-manylinux:latest"
          CIBW_ENVIRONMENT_LINUX: >
            CCACHE_DIR=/project/.ccache
            CMAKE_GENERATOR=Ninja
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            VCPKG_ROOT=/opt/vcpkg
            VCPKG_DEFAULT_TRIPLET=x64-linux-release
            VCPKG_DEFAULT_BINARY_CACHE=/project/.vcpkg_cache

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          path: ./wheelhouse/*.whl
          archive: false

  test:
    needs: build_wheels
    name: Test ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.12, 3.13, 3.14]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: |
            ${{ runner.os == 'Windows' && '*win_amd64.whl' || '' }}
            ${{ runner.os == 'macOS' && '*macosx*.whl' || '' }}
            ${{ runner.os == 'Linux' && '*manylinux*.whl' || '' }}

      - name: Install from Wheel
        shell: bash
        run: |
          chmod +x scripts/install_wheels.sh
          ./scripts/install_wheels.sh

      - name: Setup Xvfb on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri libgl1

      - name: Run tests
        shell: bash
        run: |
          mv src _src_backup
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -s "-screen 0 1920x1080x24" python -m pytest tests -q
          else
            python -m pytest tests -q
          fi
          mv _src_backup src
