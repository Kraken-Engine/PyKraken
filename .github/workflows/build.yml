name: Build Wheels

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: wheels-windows
          - os: macos-latest
            artifact_name: wheels-macos
          - os: ubuntu-latest
            artifact_name: wheels-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.0
        env:
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_BUILD: "cp312-*"
          CIBW_SKIP: "*-musllinux_* *-win32"
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_28_x86_64

          # --- Windows: vcpkg is pre-installed on GitHub runners ---
          CIBW_ENVIRONMENT_WINDOWS: >
            VCPKG_ROOT=C:/vcpkg
            VCPKG_DEFAULT_TRIPLET=x64-windows-release
            VCPKG_OVERLAY_TRIPLETS={project}/triplets

          # --- macOS: bootstrap vcpkg, use static release triplet ---
          CIBW_BEFORE_ALL_MACOS: >
            git clone --depth 1 https://github.com/microsoft/vcpkg.git /tmp/vcpkg &&
            /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=11.0
            VCPKG_ROOT=/tmp/vcpkg
            VCPKG_DEFAULT_TRIPLET=arm64-osx-release
            VCPKG_OVERLAY_TRIPLETS={project}/triplets

          # --- Linux: install system headers, bootstrap vcpkg, use static release triplet ---
          CIBW_BEFORE_ALL_LINUX: >
            dnf -y install
            alsa-lib-devel pipewire-devel pulseaudio-libs-devel
            libXrandr-devel libXcursor-devel libXi-devel libXinerama-devel libXfixes-devel libXScrnSaver-devel libXtst-devel
            mesa-libEGL-devel mesa-libgbm-devel
            wayland-devel wayland-protocols-devel libxkbcommon-devel
            libpng-devel libjpeg-turbo-devel freetype-devel flac-devel
            libxcrypt-devel
            autoconf autoconf-archive automake libtool perl
            zip unzip curl tar &&
            git clone --depth 1 https://github.com/microsoft/vcpkg.git /opt/vcpkg &&
            /opt/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          CIBW_ENVIRONMENT_LINUX: >
            VCPKG_ROOT=/opt/vcpkg
            VCPKG_DEFAULT_TRIPLET=x64-linux-release
            VCPKG_OVERLAY_TRIPLETS={project}/triplets
            VCPKG_OVERLAY_PORTS={project}/overlay-ports

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./wheelhouse/*.whl
