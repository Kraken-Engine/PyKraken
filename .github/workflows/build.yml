name: Build and Test Wheels

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup vcpkg Cache (Linux Container)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: .vcpkg_cache
          key: Linux-vcpkg-cache-${{ github.sha }}
          restore-keys: |
            Linux-vcpkg-cache-

      - name: Create Cache Directories (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p .vcpkg_cache

      - name: Set up vcpkg
        if: runner.os == 'Windows' || runner.os == 'macOS'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ runner.os == 'Windows' && 'C:/vcpkg' || '/Users/runner/work/vcpkg' }}
          vcpkgJsonGlob: "vcpkg.json"

      - name: Setup MSVC Developer Command Prompt (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BUILD_FRONTEND: "build[uv]"
          CIBW_BUILD: "cp312-*"
          CIBW_SKIP: "*-musllinux_* *-win32"

          # --- Windows ---
          CIBW_BEFORE_ALL_WINDOWS: >
            pip install ninja &&
            git config --global --add safe.directory C:/vcpkg
          CIBW_ENVIRONMENT_WINDOWS: >
            CC=cl
            CXX=cl
            VCPKG_ROOT=C:/vcpkg
            VCPKG_DEFAULT_TRIPLET=x64-windows-release
            CMAKE_GENERATOR=Ninja
            VCPKG_KEEP_PDB=0

          # --- macOS ---
          CIBW_BEFORE_ALL_MACOS: brew install ninja
          CIBW_ENVIRONMENT_MACOS: >
            CC=clang
            CXX=clang++
            MACOSX_DEPLOYMENT_TARGET=15.0
            CMAKE_GENERATOR=Ninja
            VCPKG_ROOT=/Users/runner/work/vcpkg
            VCPKG_DEFAULT_TRIPLET=arm64-osx-release

          # --- Linux ---
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_BEFORE_ALL_LINUX: >
            dnf -y install gcc gcc-c++
            ninja-build git curl zip unzip tar
            alsa-lib-devel pipewire-devel pulseaudio-libs-devel
            libX11-devel libXext-devel libXft-devel
            libXrandr-devel libXcursor-devel libXi-devel libXinerama-devel libXfixes-devel libXScrnSaver-devel libXtst-devel
            mesa-libEGL-devel mesa-libgbm-devel
            wayland-devel wayland-protocols-devel libxkbcommon-devel
            vulkan-headers vulkan-loader-devel
            ibus-devel
            libpng-devel libjpeg-turbo-devel freetype-devel flac-devel libzstd-devel
            autoconf autoconf-archive automake libtool pkgconfig perl-core &&
            git clone https://github.com/microsoft/vcpkg.git /opt/vcpkg &&
            cd /opt/vcpkg &&
            git checkout 256acc64012b23a13041d8705805e1f23b43a024 &&
            ./bootstrap-vcpkg.sh -disableMetrics
          CIBW_ENVIRONMENT_LINUX: >
            CC=gcc
            CXX=g++
            CMAKE_GENERATOR=Ninja
            VCPKG_ROOT=/opt/vcpkg
            VCPKG_DEFAULT_TRIPLET=x64-linux-release
            VCPKG_DEFAULT_BINARY_CACHE=/project/.vcpkg_cache

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          path: ./wheelhouse/*.whl
          archive: false

  test:
    needs: build_wheels
    name: Test ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.12, 3.13, 3.14]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: |
            ${{ runner.os == 'Windows' && '*win_amd64.whl' || '' }}
            ${{ runner.os == 'macOS' && '*macosx*.whl' || '' }}
            ${{ runner.os == 'Linux' && '*manylinux*.whl' || '' }}

      - name: Install from Wheel
        shell: bash
        run: |
          chmod +x scripts/install_wheels.sh
          ./scripts/install_wheels.sh

      - name: Setup Xvfb on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri libgl1

      - name: Run tests
        shell: bash
        run: |
          mv src _src_backup
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -s "-screen 0 1920x1080x24" python -m pytest tests -q
          else
            python -m pytest tests -q
          fi
          mv _src_backup src
